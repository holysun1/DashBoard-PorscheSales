    <style>
        :root {
            --porsche-red: #d5001c;
            --porsche-black: #191f22;
            --porsche-white: #ffffff;
            --porsche-bg: #f3f4f5;
            --porsche-border: #e0e4e8;
            --text-dark: #191f22;
            --text-muted: #6b767c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            border-radius: 0 !important; /* Design Porsche utiliza cantos vivos e retos */
        }

        body {
            background-color: var(--porsche-bg);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* Topbar simulando a navegação global da Porsche */
        header {
            background-color: var(--porsche-black);
            color: var(--porsche-white);
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 22px;
        }

        h1 strong {
            font-weight: 700;
        }

        .header-subtitle {
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* Container principal para limitar a largura e centralizar */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 40px;
        }

        /* Seção de Filtros Minimalista */
        .filters-section {
            background-color: var(--porsche-white);
            padding: 30px;
            border: 1px solid var(--porsche-border);
            margin-bottom: 30px;
        }

        .filters-section h2 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: var(--porsche-black);
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        select {
            background-color: transparent;
            color: var(--text-dark);
            border: 1px solid var(--porsche-border);
            padding: 12px 15px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23191f22' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 14px;
        }

        select:focus, select:hover {
            border-color: var(--porsche-black);
        }

        /* KPIs Estilo Editorial */
        .kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background-color: var(--porsche-white);
            padding: 30px 20px;
            border: 1px solid var(--porsche-border);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .kpi-card h3 {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .kpi-card p {
            font-size: 28px;
            font-weight: 300;
            color: var(--porsche-black);
        }

        /* Gráficos */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background-color: var(--porsche-white);
            padding: 30px;
            border: 1px solid var(--porsche-border);
        }

        .chart-container h2 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--porsche-black);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--porsche-border);
            padding-bottom: 15px;
        }

        /* Painel de Insights */
        .insights-panel {
            background-color: var(--porsche-white);
            padding: 40px;
            border: 1px solid var(--porsche-border);
            border-top: 3px solid var(--porsche-red);
        }

        .insights-panel h2 {
            font-size: 18px;
            font-weight: 300;
            margin-bottom: 25px;
            color: var(--porsche-black);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .insights-list {
            list-style: none;
            font-size: 15px;
            line-height: 1.8;
            color: var(--text-muted);
        }

        .insights-list li {
            margin-bottom: 20px;
            position: relative;
            padding-left: 25px;
        }
        
        .insights-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10px;
            width: 6px;
            height: 6px;
            background-color: var(--porsche-red);
        }

        .insights-list strong {
            color: var(--porsche-black);
            font-weight: 600;
        }

        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

        // Lógica de Parse CSV
        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            return lines.slice(1).map(line => {
                const values = line.split(',');
                return {
                    model: values[3].trim(),
                    year: values[4].trim(),
                    price: parseFloat(values[5]),
                    pay: values[7].trim(),
                    city: values[8].trim()
                };
            });
        }

        const rawData = parseCSV(csvData);
        let modelsChart, yearsChart;

        // Setup fonte global para o Chart.js
        Chart.defaults.font.family = "'Inter', sans-serif";

        const formatCurrency = (value) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(value);

        function populateFilters() {
            const models = [...new Set(rawData.map(d => d.model))].sort();
            const years = [...new Set(rawData.map(d => d.year))].sort();
            const cities = [...new Set(rawData.map(d => d.city))].sort();
            const payments = [...new Set(rawData.map(d => d.pay))].sort();

            const createOptions = (arr, elementId) => {
                const select = document.getElementById(elementId);
                arr.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item;
                    option.textContent = item;
                    select.appendChild(option);
                });
            };

            createOptions(models, 'filter-model');
            createOptions(years, 'filter-year');
            createOptions(cities, 'filter-city');
            createOptions(payments, 'filter-payment');
        }

        function getFilteredData() {
            const mFilter = document.getElementById('filter-model').value;
            const yFilter = document.getElementById('filter-year').value;
            const cFilter = document.getElementById('filter-city').value;
            const pFilter = document.getElementById('filter-payment').value;

            return rawData.filter(d => {
                return (mFilter === "All" || d.model === mFilter) &&
                       (yFilter === "All" || d.year === yFilter) &&
                       (cFilter === "All" || d.city === cFilter) &&
                       (pFilter === "All" || d.pay === pFilter);
            });
        }

        function getCountBy(data, key) {
            return data.reduce((acc, curr) => {
                acc[curr[key]] = (acc[curr[key]] || 0) + 1;
                return acc;
            }, {});
        }

            const data = getFilteredData();

            if(data.length === 0) {
                document.getElementById('kpi-revenue').textContent = "US$ 0";
                document.getElementById('kpi-volume').textContent = "0";
                document.getElementById('kpi-top-year').textContent = "-";
                document.getElementById('kpi-top-model').textContent = "-";
                if(modelsChart) modelsChart.destroy();
                if(yearsChart) yearsChart.destroy();
                generateInsights(data);
                return;
            }

            const totalRevenue = data.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('kpi-revenue').textContent = formatCurrency(totalRevenue);
            document.getElementById('kpi-volume').textContent = data.length;

            const yearCounts = getCountBy(data, 'year');
            const topYear = Object.keys(yearCounts).reduce((a, b) => yearCounts[a] > yearCounts[b] ? a : b);
            document.getElementById('kpi-top-year').textContent = topYear;

            const modelCounts = getCountBy(data, 'model');
            const topModel = Object.keys(modelCounts).reduce((a, b) => modelCounts[a] > modelCounts[b] ? a : b);
            document.getElementById('kpi-top-model').textContent = topModel;

            // Gráfico 1: Barras
            if (modelsChart) modelsChart.destroy();
            const ctxModels = document.getElementById('modelsChart').getContext('2d');
            const sortedModels = Object.entries(modelCounts).sort((a, b) => b[1] - a[1]);
            
            modelsChart = new Chart(ctxModels, {
                type: 'bar',
                data: {
                    labels: sortedModels.map(item => item[0]),
                    datasets: [{
                        label: 'Volume',
                        data: sortedModels.map(item => item[1]),
                        backgroundColor: '#191f22',
                        hoverBackgroundColor: '#d5001c', // Interação Porsche Red
                        borderRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { ticks: { color: '#6b767c' }, grid: { color: '#e0e4e8' } },
                        x: { ticks: { color: '#191f22', autoSkip: false, maxRotation: 45, minRotation: 45 }, grid: { display: false } }
                    }
                }
            });

            // Gráfico 2: Rosca
            if (yearsChart) yearsChart.destroy();
            const ctxYears = document.getElementById('yearChart').getContext('2d');
            yearsChart = new Chart(ctxYears, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(yearCounts),
                    datasets: [{
                        data: Object.values(yearCounts),
                        backgroundColor: ['#d5001c', '#191f22', '#6b767c', '#a0aab0', '#d8dcdf'],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'right', labels: { color: '#191f22', usePointStyle: true, boxWidth: 8 } } },
                    cutout: '80%' // Design fino e minimalista
                }
            });

            generateInsights(data);
        }

        function generateInsights(data) {
            const list = document.getElementById('insights-list');
            list.innerHTML = '';

            if(data.length === 0) {
                list.innerHTML = '<li>Nenhuma venda registrada com os critérios atuais.</li>';
                return;
            }

            const yearCounts = getCountBy(data, 'year');
            const topYear = Object.keys(yearCounts).reduce((a, b) => yearCounts[a] > yearCounts[b] ? a : b);
            
            const cityMap = {};
            data.forEach(d => {
                if(!cityMap[d.city]) cityMap[d.city] = {};
                cityMap[d.city][d.model] = (cityMap[d.city][d.model] || 0) + 1;
            });

            let cityHighlights = [];
            let i = 0;
            const sortedCities = Object.keys(cityMap).sort((a,b) => {
                const totalA = Object.values(cityMap[a]).reduce((sum, val)=>sum+val,0);
                const totalB = Object.values(cityMap[b]).reduce((sum, val)=>sum+val,0);
                return totalB - totalA;
            });

            for(let city of sortedCities) {
                if(i >= 3) break;
                let topModel = Object.keys(cityMap[city]).reduce((a, b) => cityMap[city][a] > cityMap[city][b] ? a : b);
                cityHighlights.push(`em <strong>${city}</strong>, a liderança pertence ao <strong>${topModel}</strong>`);
                i++;
            }

            const insights = [
                `No atual cenário de filtros, o <strong>Ano de Modelo ${topYear}</strong> demonstra a maior performance comercial, com <strong>${yearCounts[topYear]} unidades</strong> registradas.`,
                `Distribuição Geográfica de Portfólio: A inteligência regional revela que ${cityHighlights.join("; ")}. Esta métrica direciona a logística de alocação de estoque para estas praças.`,
                `O ticket médio gerado através das modalidades de pagamento selecionadas compõe uma receita bruta calculada em <strong>${formatCurrency(data.reduce((sum, item) => sum + item.price, 0))}</strong>.`
            ];

            insights.forEach(text => {
                const li = document.createElement('li');
                li.innerHTML = text;
                list.appendChild(li);
            });
        }

        document.querySelectorAll('select').forEach(select => {
            select.addEventListener('change', updateDashboard);
        });

        populateFilters();
        updateDashboard();
    </script>
</body>
</html>
